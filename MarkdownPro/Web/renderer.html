<!doctype html>
<html>
<head>
<meta charset="utf-8">
<base id="docbase">
<link rel="stylesheet" href="hljs-github.css" media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="hljs-github-dark.css" media="(prefers-color-scheme: dark)">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    font: 15px/1.65 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    color: #1d2129;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #d4d7dc; }
  }
  #content {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 36px 80px;
    word-wrap: break-word;
  }
  h1, h2, h3, h4 { line-height: 1.3; margin: 1.4em 0 0.5em; font-weight: 650; }
  h1 { font-size: 1.9em; padding-bottom: .3em; border-bottom: 1px solid rgba(128,128,128,.25); }
  h2 { font-size: 1.45em; padding-bottom: .25em; border-bottom: 1px solid rgba(128,128,128,.2); }
  h3 { font-size: 1.17em; }
  a { color: #0969da; text-decoration: none; }
  a:hover { text-decoration: underline; }
  @media (prefers-color-scheme: dark) { a { color: #58a6ff; } }
  p, ul, ol { margin: 0.6em 0; }
  li + li { margin-top: 0.2em; }
  li.task-item { list-style: none; margin-left: -1.3em; }
  code {
    font: 0.88em/1.5 "SF Mono", ui-monospace, Menlo, monospace;
    background: rgba(128,128,128,.14);
    padding: .15em .35em;
    border-radius: 4px;
  }
  pre {
    background: rgba(128,128,128,.09);
    border: 1px solid rgba(128,128,128,.18);
    border-radius: 8px;
    padding: 12px 16px;
    overflow-x: auto;
  }
  pre code { background: none; padding: 0; font-size: 0.85em; display: block; }
  blockquote {
    margin: 0.8em 0;
    padding: 0.1em 1em;
    border-left: 3px solid rgba(128,128,128,.4);
    color: rgba(128,128,128,1);
  }
  table { border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; }
  th, td { border: 1px solid rgba(128,128,128,.3); padding: 6px 13px; }
  th { background: rgba(128,128,128,.1); font-weight: 600; }
  img { max-width: 100%; border-radius: 6px; }
  hr { border: none; border-top: 1px solid rgba(128,128,128,.25); margin: 1.6em 0; }
  .mermaid {
    background: transparent;
    border: none;
    display: flex;
    justify-content: center;
    padding: 8px 0;
  }
  .mermaid-error {
    color: #c0392b;
    font: 0.85em "SF Mono", ui-monospace, monospace;
    white-space: pre-wrap;
  }
  ::highlight(review) { background: rgba(255, 196, 0, .38); }
  #annotate-btn {
    position: absolute; display: none; z-index: 10;
    font: 12px/1 -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1f6feb; color: #fff; border: none; border-radius: 6px;
    padding: 5px 10px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  #empty {
    color: rgba(128,128,128,.8);
    text-align: center;
    margin-top: 30vh;
    font-size: 0.95em;
  }
</style>
<script src="marked.min.js"></script>
<script src="highlight.min.js"></script>
<script src="mermaid.min.js"></script>
</head>
<body>
<article id="content"><p id="empty">Select a markdown file</p></article>
<button id="annotate-btn" type="button">Comment (c)</button>
<script>
(function () {
  'use strict';

  var darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
  var lastMarkdown = null;
  var lastBase = '';
  var renderSeq = 0;

  function initMermaid() {
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'strict',
      theme: darkQuery.matches ? 'dark' : 'default'
    });
  }
  initMermaid();

  // In-page anchor links (#heading) scroll within the document instead of
  // navigating the web view away (the <base> tag would otherwise break them).
  document.getElementById('content').addEventListener('click', function (e) {
    var a = e.target.closest ? e.target.closest('a[href^="#"]') : null;
    if (!a) return;
    var id = decodeURIComponent(a.getAttribute('href').slice(1));
    var target = id ? document.getElementById(id) : document.body;
    if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  });

  // Re-theme mermaid diagrams when the system appearance flips.
  darkQuery.addEventListener('change', function () {
    initMermaid();
    if (lastMarkdown !== null) window.renderMarkdown(lastMarkdown, lastBase);
  });

  window.renderMarkdown = async function (markdown, baseHref) {
    lastMarkdown = markdown;
    lastBase = baseHref || '';
    var seq = ++renderSeq;

    // Relative image/link paths resolve against the source file's folder.
    var base = document.getElementById('docbase');
    base.href = lastBase ? (lastBase.endsWith('/') ? lastBase : lastBase + '/') : '';

    var content = document.getElementById('content');
    content.innerHTML = marked.parse(markdown, { gfm: true });

    // Give headings GitHub-style slug ids so "#anchor" links have targets.
    var usedSlugs = {};
    content.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(function (h) {
      if (h.id) return;
      var slug = h.textContent.toLowerCase().trim()
        .replace(/[^\w\s-]/g, '').replace(/\s+/g, '-') || 'section';
      if (usedSlugs[slug] != null) { usedSlugs[slug]++; slug += '-' + usedSlugs[slug]; }
      else { usedSlugs[slug] = 0; }
      h.id = slug;
    });

    // Task lists: nicer checkboxes.
    content.querySelectorAll('li').forEach(function (li) {
      if (li.querySelector(':scope > input[type="checkbox"]')) li.classList.add('task-item');
    });

    // Syntax highlighting for fenced code blocks (skip mermaid).
    content.querySelectorAll('pre code').forEach(function (block) {
      if (block.classList.contains('language-mermaid')) return;
      try { hljs.highlightElement(block); } catch (e) { /* unknown language */ }
    });

    // Mermaid: swap ```mermaid blocks for rendered diagrams.
    var mermaidBlocks = content.querySelectorAll('pre code.language-mermaid');
    var targets = [];
    mermaidBlocks.forEach(function (block) {
      var holder = document.createElement('pre');
      holder.className = 'mermaid';
      holder.textContent = block.textContent;
      block.parentElement.replaceWith(holder);
      targets.push(holder);
    });
    for (var i = 0; i < targets.length; i++) {
      if (seq !== renderSeq) return; // a newer render superseded this one
      try {
        var result = await mermaid.render('mmd-' + seq + '-' + i, targets[i].textContent);
        targets[i].innerHTML = result.svg;
      } catch (err) {
        var msg = document.createElement('div');
        msg.className = 'mermaid-error';
        msg.textContent = 'mermaid: ' + (err && err.message ? err.message : err);
        targets[i].replaceChildren(msg);
      }
    }
    if (window.__reviewRepaint) window.__reviewRepaint();
  };
})();
</script>
<script>
(function () {
  'use strict';

  var annotations = [];   // [{id, quote, prefix, suffix}] — current round, open
  var anchorRanges = {};  // id -> {start, end} offsets into content.textContent
  var pendingSelection = null;
  var content = document.getElementById('content');
  var btn = document.getElementById('annotate-btn');

  function post(msg) {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.review) {
      window.webkit.messageHandlers.review.postMessage(msg);
    }
  }

  function contentText() { return content.textContent; }

  // Convert [start, end) offsets over content.textContent to a DOM Range.
  function textRange(start, end) {
    var walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    var range = document.createRange();
    var pos = 0, node, haveStart = false;
    while ((node = walker.nextNode())) {
      var next = pos + node.data.length;
      if (!haveStart && start < next) { range.setStart(node, start - pos); haveStart = true; }
      if (haveStart && end <= next) { range.setEnd(node, end - pos); return range; }
      pos = next;
    }
    return null;
  }

  // W3C TextQuoteSelector matching: prefer the quote occurrence whose
  // surrounding text matches prefix/suffix; fall back to first occurrence.
  function findAnchor(a) {
    if (!a.quote) return null;
    var text = contentText();
    var from = 0, idx, best = null;
    while ((idx = text.indexOf(a.quote, from)) !== -1) {
      var score = 0;
      if (a.prefix && text.slice(Math.max(0, idx - a.prefix.length), idx) === a.prefix) score++;
      if (a.suffix && text.slice(idx + a.quote.length, idx + a.quote.length + a.suffix.length) === a.suffix) score++;
      if (!best || score > best.score) best = { start: idx, score: score };
      if (score === 2) break;
      from = idx + 1;
    }
    return best ? { start: best.start, end: best.start + a.quote.length } : null;
  }

  function repaint() {
    anchorRanges = {};
    var anchored = {};
    var ranges = [];
    annotations.forEach(function (a) {
      var pos = findAnchor(a);
      anchored[a.id] = !!pos;
      if (pos) {
        anchorRanges[a.id] = pos;
        var r = textRange(pos.start, pos.end);
        if (r) ranges.push(r);
      }
    });
    // CSS Custom Highlight API (Safari 17.2+). Without it, comments still
    // work from the side panel — graceful degradation per spec.
    if (window.Highlight && CSS.highlights) {
      CSS.highlights.delete('review');
      if (ranges.length) CSS.highlights.set('review', new Highlight(...ranges));
    }
    post({ type: 'anchors', anchored: anchored });
  }
  window.__reviewRepaint = repaint;

  window.setReviewAnnotations = function (list) {
    annotations = list || [];
    repaint();
  };

  // Click on a painted highlight -> select its comment in the panel.
  content.addEventListener('click', function (e) {
    var caret = document.caretRangeFromPoint(e.clientX, e.clientY);
    if (!caret) return;
    var probe = document.createRange();
    probe.selectNodeContents(content);
    probe.setEnd(caret.startContainer, caret.startOffset);
    var offset = probe.toString().length;
    for (var id in anchorRanges) {
      if (offset >= anchorRanges[id].start && offset <= anchorRanges[id].end) {
        post({ type: 'annotationClicked', id: Number(id) });
        return;
      }
    }
  });

  function hideButton() {
    btn.style.display = 'none';
    pendingSelection = null;
  }

  function captureSelection() {
    // Only in the Review Center (which installs the handler); the plain
    // reader never shows the comment button.
    if (!(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.review)) return;
    var sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) { hideButton(); return; }
    var range = sel.getRangeAt(0);
    if (!content.contains(range.commonAncestorContainer)) { hideButton(); return; }
    var quote = range.toString();
    if (!quote.trim()) { hideButton(); return; }
    var probe = document.createRange();
    probe.selectNodeContents(content);
    probe.setEnd(range.startContainer, range.startOffset);
    var start = probe.toString().length;
    var text = contentText();
    pendingSelection = {
      quote: quote,
      prefix: text.slice(Math.max(0, start - 32), start),
      suffix: text.slice(start + quote.length, start + quote.length + 32)
    };
    var rect = range.getBoundingClientRect();
    btn.style.left = (window.scrollX + rect.left) + 'px';
    btn.style.top = (window.scrollY + rect.bottom + 6) + 'px';
    btn.style.display = 'block';
  }

  function sendPending() {
    if (!pendingSelection) return;
    post({ type: 'selection', quote: pendingSelection.quote,
           prefix: pendingSelection.prefix, suffix: pendingSelection.suffix });
    hideButton();
    window.getSelection().removeAllRanges();
  }

  document.addEventListener('mouseup', function () { setTimeout(captureSelection, 0); });
  // mousedown (not click) so we act before the selection collapses.
  btn.addEventListener('mousedown', function (e) { e.preventDefault(); sendPending(); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'c' && pendingSelection && !e.metaKey && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      sendPending();
    }
  });
})();
</script>
</body>
</html>
