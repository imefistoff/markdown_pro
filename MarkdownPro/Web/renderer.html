<!doctype html>
<html>
<head>
<meta charset="utf-8">
<base id="docbase">
<link rel="stylesheet" href="hljs-github.css" media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="hljs-github-dark.css" media="(prefers-color-scheme: dark)">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    font: 15px/1.65 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    color: #1d2129;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #d4d7dc; }
  }
  #content {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 36px 80px;
    word-wrap: break-word;
  }
  h1, h2, h3, h4 { line-height: 1.3; margin: 1.4em 0 0.5em; font-weight: 650; }
  h1 { font-size: 1.9em; padding-bottom: .3em; border-bottom: 1px solid rgba(128,128,128,.25); }
  h2 { font-size: 1.45em; padding-bottom: .25em; border-bottom: 1px solid rgba(128,128,128,.2); }
  h3 { font-size: 1.17em; }
  a { color: #0969da; text-decoration: none; }
  a:hover { text-decoration: underline; }
  @media (prefers-color-scheme: dark) { a { color: #58a6ff; } }
  p, ul, ol { margin: 0.6em 0; }
  li + li { margin-top: 0.2em; }
  li.task-item { list-style: none; margin-left: -1.3em; }
  code {
    font: 0.88em/1.5 "SF Mono", ui-monospace, Menlo, monospace;
    background: rgba(128,128,128,.14);
    padding: .15em .35em;
    border-radius: 4px;
  }
  pre {
    background: rgba(128,128,128,.09);
    border: 1px solid rgba(128,128,128,.18);
    border-radius: 8px;
    padding: 12px 16px;
    overflow-x: auto;
  }
  pre code { background: none; padding: 0; font-size: 0.85em; display: block; }
  blockquote {
    margin: 0.8em 0;
    padding: 0.1em 1em;
    border-left: 3px solid rgba(128,128,128,.4);
    color: rgba(128,128,128,1);
  }
  table { border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; }
  th, td { border: 1px solid rgba(128,128,128,.3); padding: 6px 13px; }
  th { background: rgba(128,128,128,.1); font-weight: 600; }
  img { max-width: 100%; border-radius: 6px; }
  hr { border: none; border-top: 1px solid rgba(128,128,128,.25); margin: 1.6em 0; }
  .mermaid {
    background: transparent;
    border: none;
    display: flex;
    justify-content: center;
    padding: 8px 0;
  }
  .mermaid-error {
    color: #c0392b;
    font: 0.85em "SF Mono", ui-monospace, monospace;
    white-space: pre-wrap;
  }
  #empty {
    color: rgba(128,128,128,.8);
    text-align: center;
    margin-top: 30vh;
    font-size: 0.95em;
  }
</style>
<script src="marked.min.js"></script>
<script src="highlight.min.js"></script>
<script src="mermaid.min.js"></script>
</head>
<body>
<article id="content"><p id="empty">Select a markdown file</p></article>
<script>
(function () {
  'use strict';

  var darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
  var lastMarkdown = null;
  var lastBase = '';
  var renderSeq = 0;

  function initMermaid() {
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'strict',
      theme: darkQuery.matches ? 'dark' : 'default'
    });
  }
  initMermaid();

  // Re-theme mermaid diagrams when the system appearance flips.
  darkQuery.addEventListener('change', function () {
    initMermaid();
    if (lastMarkdown !== null) window.renderMarkdown(lastMarkdown, lastBase);
  });

  window.renderMarkdown = async function (markdown, baseHref) {
    lastMarkdown = markdown;
    lastBase = baseHref || '';
    var seq = ++renderSeq;

    // Relative image/link paths resolve against the source file's folder.
    var base = document.getElementById('docbase');
    base.href = lastBase ? (lastBase.endsWith('/') ? lastBase : lastBase + '/') : '';

    var content = document.getElementById('content');
    content.innerHTML = marked.parse(markdown, { gfm: true });

    // Task lists: nicer checkboxes.
    content.querySelectorAll('li').forEach(function (li) {
      if (li.querySelector(':scope > input[type="checkbox"]')) li.classList.add('task-item');
    });

    // Syntax highlighting for fenced code blocks (skip mermaid).
    content.querySelectorAll('pre code').forEach(function (block) {
      if (block.classList.contains('language-mermaid')) return;
      try { hljs.highlightElement(block); } catch (e) { /* unknown language */ }
    });

    // Mermaid: swap ```mermaid blocks for rendered diagrams.
    var mermaidBlocks = content.querySelectorAll('pre code.language-mermaid');
    var targets = [];
    mermaidBlocks.forEach(function (block) {
      var holder = document.createElement('pre');
      holder.className = 'mermaid';
      holder.textContent = block.textContent;
      block.parentElement.replaceWith(holder);
      targets.push(holder);
    });
    for (var i = 0; i < targets.length; i++) {
      if (seq !== renderSeq) return; // a newer render superseded this one
      try {
        var result = await mermaid.render('mmd-' + seq + '-' + i, targets[i].textContent);
        targets[i].innerHTML = result.svg;
      } catch (err) {
        var msg = document.createElement('div');
        msg.className = 'mermaid-error';
        msg.textContent = 'mermaid: ' + (err && err.message ? err.message : err);
        targets[i].replaceChildren(msg);
      }
    }
  };
})();
</script>
</body>
</html>
