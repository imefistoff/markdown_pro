<!doctype html>
<html>
<head>
<meta charset="utf-8">
<!-- Documents rendered here are untrusted: proposals are machine-generated and
     marked passes raw HTML straight through to innerHTML. script-src without
     'unsafe-inline' is what stops injected onerror/onload handlers running; the
     lack of any remote source closes the exfiltration channel. Keep the page's
     own scripts in external files or this protection collapses. -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'none';
  script-src 'self';
  style-src 'self' 'unsafe-inline';
  img-src 'self' file: data:;
  font-src 'self';
  connect-src 'none';
  object-src 'none';
  frame-src 'none';
  form-action 'none';
">
<base id="docbase">
<link rel="stylesheet" href="hljs-github.css" media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="hljs-github-dark.css" media="(prefers-color-scheme: dark)">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    font: 15px/1.65 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    color: #1d2129;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #d4d7dc; }
  }
  #content {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 36px 80px;
    word-wrap: break-word;
  }
  h1, h2, h3, h4 { line-height: 1.3; margin: 1.4em 0 0.5em; font-weight: 650; }
  h1 { font-size: 1.9em; padding-bottom: .3em; border-bottom: 1px solid rgba(128,128,128,.25); }
  h2 { font-size: 1.45em; padding-bottom: .25em; border-bottom: 1px solid rgba(128,128,128,.2); }
  h3 { font-size: 1.17em; }
  a { color: #0969da; text-decoration: none; }
  a:hover { text-decoration: underline; }
  @media (prefers-color-scheme: dark) { a { color: #58a6ff; } }
  p, ul, ol { margin: 0.6em 0; }
  li + li { margin-top: 0.2em; }
  li.task-item { list-style: none; margin-left: -1.3em; }
  code {
    font: 0.88em/1.5 "SF Mono", ui-monospace, Menlo, monospace;
    background: rgba(128,128,128,.14);
    padding: .15em .35em;
    border-radius: 4px;
  }
  pre {
    background: rgba(128,128,128,.09);
    border: 1px solid rgba(128,128,128,.18);
    border-radius: 8px;
    padding: 12px 16px;
    overflow-x: auto;
  }
  pre code { background: none; padding: 0; font-size: 0.85em; display: block; }
  blockquote {
    margin: 0.8em 0;
    padding: 0.1em 1em;
    border-left: 3px solid rgba(128,128,128,.4);
    color: rgba(128,128,128,1);
  }
  table { border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; }
  th, td { border: 1px solid rgba(128,128,128,.3); padding: 6px 13px; }
  th { background: rgba(128,128,128,.1); font-weight: 600; }
  img { max-width: 100%; border-radius: 6px; }
  hr { border: none; border-top: 1px solid rgba(128,128,128,.25); margin: 1.6em 0; }
  .mermaid {
    background: transparent;
    border: none;
    display: flex;
    justify-content: center;
    padding: 8px 0;
  }
  .mermaid-error {
    color: #c0392b;
    font: 0.85em "SF Mono", ui-monospace, monospace;
    white-space: pre-wrap;
  }
  ::highlight(review) { background: rgba(255, 196, 0, .38); }
  #annotate-btn {
    position: absolute; display: none; z-index: 10;
    font: 12px/1 -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1f6feb; color: #fff; border: none; border-radius: 6px;
    padding: 5px 10px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  #empty {
    color: rgba(128,128,128,.8);
    text-align: center;
    margin-top: 30vh;
    font-size: 0.95em;
  }
</style>
<script src="marked.min.js"></script>
<script src="highlight.min.js"></script>
<script src="mermaid.min.js"></script>
</head>
<body>
<article id="content"><p id="empty">Select a markdown file</p></article>
<button id="annotate-btn" type="button">Comment (c)</button>
<script src="renderer-core.js"></script>
<script src="review-annotations.js"></script>
</body>
</html>
