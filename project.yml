# Fallback project generator. If MarkdownPro.xcodeproj ever refuses to
# open or gets mangled, regenerate a fresh one with:
#
#   brew install xcodegen
#   xcodegen
#
name: MarkdownPro
options:
  bundleIdPrefix: com.markdownpro
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  MarkdownProCore:
    path: Core
targets:
  MarkdownPro:
    type: application
    platform: macOS
    sources:
      - MarkdownPro
    dependencies:
      - package: MarkdownProCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.markdownpro.app
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_PREVIEWS: YES
        COMBINE_HIDPI_IMAGES: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
